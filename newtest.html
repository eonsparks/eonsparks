<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        .subscribe_button {
            background-color: rgb(202, 0, 0); 
            color: white;
            border: none;
            height: 36px;
            width: 105px;
            border-radius: 2px;
            margin-right: 8px;
            cursor: pointer;
                }
    </style>

    <style>
        .join_button {
            background-color: white;
            border-color: rgb(41, 118, 211);
            border-style: solid;
            border-width: 1px;
            height: 36px;
            width: 62px;
            border-radius: 2px;
            font-family: sans-serif;
            color: rgb(41, 118, 211);
            cursor: pointer;
            margin-right: 8px;    
            transition: background-color 1s;
            color: 1s;
        }
        .join_button:hover {
            background-color: rgb(41, 118, 211) ;
            color: white
        }
    </style>
    
    <style>
        .tweet_button {
            background-color: rgb(2, 158, 225);
            color: white;
            border: none;
            height: 36px;
            border-radius: 18px ;
            width: 75px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-right: 8px; 
            transition: box-shadow 0.15s;          
        }
        
        .tweet_button:hover {
            box-shadow: 5px 5px 10px 
            rgba(0, 0, 0, 0.15);
         }
         
    </style>

    <button class="tweet_button">
        Tweet</button>
    <button class="join_button">
        JOIN</button>
    <button class="subscribe_button">
        SUBSCRIBE</button>
</body>
</html>
